name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"

  # Allows manual execution
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Send POST request
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://dieseltechnicalsolutions.onrender.com/api/ping